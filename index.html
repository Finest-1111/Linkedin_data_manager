<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreNet | Intelligence Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar">
        <div class="logo">CORE<span>NET</span></div>
        <div class="stats-section" id="collegeStats">
            </div>

        <div class="action-group">
            <div class="toggle-mode" onclick="toggleRecruiterMode()">
                <div class="dot"></div>
                <span id="mode-label" style="font-size: 0.75rem; font-weight: 800; letter-spacing: 1px;">STANDARD MODE</span>
            </div>
            <button class="btn btn-primary" onclick="generatePDF()">Intelligence PDF</button>
            <button class="btn" onclick="exportToFile()">Cloud Backup</button>
            <button class="btn" onclick="document.getElementById('importFile').click()">Restore Intelligence</button>
            <input type="file" id="importFile" hidden onchange="importFromFile(event)">
        </div>
    </aside>

    <main class="main">
        <header style="margin-bottom: 3rem;">
            <h1 id="main-title" style="font-size: 2.8rem; font-weight: 800; letter-spacing: -1px;">Network Manager</h1>
            <p id="totalCount" style="color: var(--text-dim); font-size: 1rem;">Monitoring 0 active connections</p>
        </header>

        <section id="form-section" class="glass-panel">
            <input type="hidden" id="editId" value="">
            <div class="grid-4">
                <input id="nameIn" placeholder="Identity Name">
                <input id="orgIn" placeholder="Organization / College">
                <input id="qualIn" placeholder="Quality (A, A+, B)">
                <input id="linkIn" placeholder="LinkedIn URL">
            </div>
            <div style="margin-top: 1.5rem; display: flex; gap: 12px;">
                <button id="mainActionBtn" class="btn btn-primary" style="width: auto; padding: 0.8rem 2.5rem;" onclick="saveEntry()">+ Add Connection</button>
                <button id="cancelBtn" class="btn" style="width: auto; padding: 0.8rem 2.5rem; display: none;" onclick="clearForm()">Abort Edit</button>
            </div>
        </section>

        <div style="position: relative; margin-bottom: 2.5rem;">
            <input id="searchBar" style="width: 100%; background: var(--surface); border-radius: 14px; padding: 1rem 1.5rem; border: 1px solid var(--border);" placeholder="Search database for names, orgs, or priority levels..." onkeyup="runFilters()">
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Identity</th>
                        <th class="hide-in-recruiter">Organization</th>
                        <th>Tier</th>
                        <th class="hide-in-recruiter">Pipeline Status</th>
                        <th>Control</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </main>
</div>

<div id="toast-container" class="toast-area"></div>

</body>
<script src="script.js"></script>
</html>
